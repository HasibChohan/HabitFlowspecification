<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HabitFlow</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gradient-to-r from-indigo-100 to-purple-200 min-h-screen">

<div id="root"></div>

<script type="text/babel">

function App() {

  const [habits, setHabits] = React.useState([]);
  const [text, setText] = React.useState("");

  React.useEffect(() => {
    const saved = localStorage.getItem("habits");
    if (saved) setHabits(JSON.parse(saved));
  }, []);

  React.useEffect(() => {
    localStorage.setItem("habits", JSON.stringify(habits));
  }, [habits]);

  const addHabit = () => {
    if (!text.trim()) return;
    setHabits([
      ...habits,
      { id: Date.now(), name: text, streak: 0 }
    ]);
    setText("");
  };

  const doneHabit = (id) => {
    setHabits(
      habits.map(h =>
        h.id === id ? { ...h, streak: h.streak + 1 } : h
      )
    );
  };

  const deleteHabit = (id) => {
    setHabits(habits.filter(h => h.id !== id));
  };

  return (
    <div className="max-w-2xl mx-auto p-6">

      <h1 className="text-4xl font-bold text-center mb-6 text-indigo-700">
        HabitFlow 🚀
      </h1>

      <div className="flex gap-2 mb-6">
        <input
          className="w-full p-3 rounded shadow border"
          placeholder="Enter new habit..."
          value={text}
          onChange={(e) => setText(e.target.value)}
        />
        <button
          onClick={addHabit}
          className="bg-indigo-600 text-white px-4 rounded"
        >
          Add
        </button>
      </div>

      <div className="space-y-3">

        {habits.length === 0 && (
          <p className="text-center text-gray-600">
            No habits yet. Add your first habit 👆
          </p>
        )}

        {habits.map(h => (
          <div
            key={h.id}
            className="bg-white p-4 rounded shadow flex justify-between items-center"
          >

            <div>
              <h2 className="font-bold text-lg">{h.name}</h2>
              <p className="text-sm text-gray-500">
                🔥 Streak: {h.streak}
              </p>
            </div>

            <div className="flex gap-2">

              <button
                onClick={() => doneHabit(h.id)}
                className="bg-green-500 text-white px-3 py-1 rounded"
              >
                Done
              </button>

              <button
                onClick={() => deleteHabit(h.id)}
                className="bg-red-500 text-white px-3 py-1 rounded"
              >
                Delete
              </button>

            </div>

          </div>
        ))}

      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
